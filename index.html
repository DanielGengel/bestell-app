<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="main.css" />
        <link rel="shortcut icon" href="./assets/icons/mobile-cart-icon-orange.png" type="image/x-icon">
        <script src="./scripts/menuDB.js" defer></script>
        <script src="./scripts/data.js" defer></script>
        <script src="./scripts/storage.js" defer></script>
        <script src="./scripts/cart.js" defer></script>
        <script src="./scripts/render.js" defer></script>
        <script src="./scripts/templates.js" defer></script>
         <script src="./scripts/events.js" defer></script>
        <script src="script.js" defer></script>
        <title>Bestell-App</title>
    </head>
    <body>
        <header class="mainHeader">
            <div class="mainHeaderMenu">
                <img class="appIcon" src="./assets/icons/bestell-app-icon.png" alt="Bestell-App-Icon" />
                <img class="burgerMenuIcon" src="./assets/icons/burger-menu-icon.png" alt="menu-icon" />
            </div>
            <div class="mainHeaderImage">
                <img class="headerImage" src="./assets/img/header-image.jpg" alt="Header image" />
                <img class="headerIcon" src="./assets/icons/main-icon.png" alt="Header Icon" />
            </div>
            <div class="mainHeaderHeadline">
                <h1>Burger<span>House</span></h1>
                <img src="./assets/icons/rating-icon.png" alt="" />
            </div>
            <div class="mainHeaderSubline">
                <h2>The best of Burgers, Pizza, and Greens, all in one great place.</h2>
            </div>
        </header>
        <main>
            <section id="content" class="content">
                <section id="menuSectionID"></section>
            </section>

            <dialog id="mobileCartID" class="mobileCart"></dialog>

            <div class="desktopCartContainer">
                <aside id="desktopCartID" class="desktopCart"></aside>
            </div>

            <section id="cartContent"></section>

            <dialog id="orderConfirmationID" class="orderConfirmation"></dialog>

        </main>
        <footer class="mainFooter">
            <div class="mainFooterContent">
                <span class="copyright">© 2026 BurgerHouse</span>
                <span class="imprint">Imprint</span>
                <span class="cookies">Cookie Preferences</span>
            </div>
            <div class="footerMobileNavigation">
                <nav class="footerMobileNavBar">
                    <ul>
                        <li><a href="index.html#"><img src="./assets/icons/home-icon-white.png" alt="Home Icon"/></a></li>
                        <li><a href="index.html#"><img src="./assets/icons/person-icon-white.png" alt="Person Icon"/></a></li>
                        <li><a href="index.html#articleCategoryID"><img src="./assets/icons/menu-icon-white.png" alt="Menu Icon"/></a></li>
                        <li><button id="btnOpenMobileCartID" class="btnOpenMobileCart"><img id="mobileCartIconID" class="mobileCartIcon" 
                            src="./assets/icons/mobile-cart-icon-white.png" alt="Shopping cart Icon"/>
                        <div id="mobileCartBadgeID" class="mobileCartBadge badgeDesign"></div></button></li>
                    </ul>
                </nav>
            </div>
        </footer>
    </body>
</html>
